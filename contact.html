<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us-Welcome Myanmar</title>
    <link rel="stylesheet" href="contact.css" />
  </head>
  <body>
    <header><h1>Contact Us</h1></header>
    <section class="contact-section">
      <p>
        If you have any questions or would like to learn more about Myanmar,
        feel free to reach out to us!
      </p>
      <form action="#" method="post">
        <label for="name">Your Name</label>
        <input type="text" id="name" name="email" required />
        <label for="message">Message</label>
        <textarea name="message" id="message" rows="5" required></textarea>
        <!-- <a href="https://myanmartravel.com/myanmar-travel-guide/" class="button-link">Send Message</a> -->
        <a href="https://myanmartravel.com/myanmar-travel-guide/">
          <button type="button">Send Message</button>
        </a>
      </form>
    </section>
    <footer>
      <p>&copy;2025 Welcome to Myanmar</p>
    </footer>
  </body>
</html>
